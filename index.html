<!DOCTYPE html>
<html>
<head>
    <title>My Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { width: 100%; height: 400px; }
    </style>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div>
        <h1>My App</h1>
        <div id="bottom-nav">
            <button id="tab-map">Map</button>
        </div>
        <div id="panelMap" style="display:none;">
            <div id="map"></div>
        </div>
    </div>
    <script>
        // Initialize the map
        var map = L.map('map').setView([51.505, -0.09], 13);

        // Load and display tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Real-time location tracking
        function onLocationFound(e) {
            var radius = e.accuracy / 2;
            L.marker(e.latlng).addTo(map)
                .bindPopup('You are within ' + radius + ' meters from this point').openPopup();
            L.circle(e.latlng, radius).addTo(map);
        }

        function onLocationError(e) {
            alert(e.message);
        }

        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);

        // Request location
        map.locate({setView: true, maxZoom: 16});

        // Dummy S variable for stops
        var S = { 
            stopCoords: [[51.51, -0.1], [51.49, -0.08]], 
            currentStop: 0,
            nextStop: 1,
            radius: 500 
        };

        // Adding stop markers
        S.stopCoords.forEach(function(coord, index) {
            var marker = L.marker(coord).addTo(map);
            if (index === S.currentStop) {
                marker.bindPopup('Current Stop').openPopup();
            }
            if (index === S.nextStop) {
                L.circle(coord, {color: 'blue', radius: S.radius}).addTo(map);
                marker.bindPopup('Next Stop').openPopup();
            }
        });

        // Toggle Stop Markers
        var showMarkers = true;
        document.getElementById('tab-map').addEventListener('click', function() {
            var panel = document.getElementById('panelMap');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        });
    </script>
</body>
</html>
