<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <title>Hlidac Test</title>
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>Profile</li>
            <li id="map-tab">Mapa</li>
        </ul>
    </nav>
    <div id="map" style="display: none;"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map, currentMarker, accuracyCircle;
        let stops = []; // Assume this gets populated with stop data
        let curIdx = 0; // Current index to manage stop highlights

        function initMap() {
            map = L.map('map').setView([51.505, -0.09], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
                maxZoom: 19,
            }).addTo(map);
            currentMarker = L.marker([0, 0]).addTo(map);
            accuracyCircle = L.circle([0, 0], { color: 'blue', fillOpacity: 0.1 }).addTo(map);
            // Add stops to map
            stops.forEach(stop => {
                L.marker(stop.coordinates).addTo(map).bindPopup(stop.name);
            });
        }

        function updateMap() {
            // Update current position
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                currentMarker.setLatLng([lat, lon]);
                accuracyCircle.setLatLng([lat, lon]).setRadius(position.coords.accuracy);
            });
            // Update next stop highlight
            if(stops[curIdx]) {
                // Assume S.radius is defined
                const nextStop = stops[curIdx + 1];
                if(nextStop) {
                    L.circle(nextStop.coordinates, { radius: S.radius }).addTo(map);
                }
            }
        }

        function mapCenterOnMe() {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                map.setView([lat, lon]);
            });
        }

        function mapFitSpoj() {
            // Logic to fit the map view based on selected spoj
            // Assume selectedSpoj is available
        }

        document.getElementById('map-tab').addEventListener('click', () => {
            document.getElementById('map').style.display = 'block';
            initMap();
            updateMap(); // Initial call to updateMap
        });

        // Assuming GPS updates and other event handlers are set up elsewhere
    </script>
</body>
</html>
